# Déploiement production s2gBot
#
# Stratégie :
#   1. Le runner GitHub checkout le code complet (le secret reste côté GitHub).
#   2. rsync vers le serveur via SSH (port 167) — plus besoin de git/PAT sur le serveur.
#   3. SSH pour exécuter docker-prod-refresh.sh.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST      — hôte SSH du serveur prod
#   DEPLOY_USER      — utilisateur SSH (ex. deploy ou root)
#   DEPLOY_SSH_KEY   — clé privée PEM (ed25519 recommandé, sans passphrase)
#   DEPLOY_PATH      — chemin absolu cible sur le serveur (ex. /opt/s2gBot)
#
# Bootstrap serveur (une fois) : voir scripts/bootstrap-server-deploy.sh

name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Vérifier secrets requis
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEPLOY_SSH_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "❌ Secret manquant : $var"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "✓ Tous les secrets sont présents"

      - name: Configurer SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 167 -T 10 "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✓ SSH configuré (port 167)"

      - name: Extraire APP_VERSION depuis package.json
        id: ver
        run: |
          PKG_VER=$(node -p "require('./react-frontend/package.json').version")
          echo "pkg_ver=$PKG_VER" >> $GITHUB_OUTPUT
          echo "✓ APP_VERSION = $PKG_VER"

      - name: Rsync code vers serveur prod
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='.env.docker' \
            --exclude='laravel-api/storage/logs/*' \
            --exclude='laravel-api/storage/framework/cache/*' \
            --exclude='laravel-api/storage/framework/sessions/*' \
            --exclude='laravel-api/storage/framework/views/*' \
            --exclude='react-frontend/dist' \
            --exclude='.run' \
            --exclude='PROLAB/' \
            --exclude='BD_S2G_PROLAB/' \
            --exclude='*.zip' \
            --exclude='*.fic' \
            --exclude='*.FIC' \
            --exclude='*.ndx' \
            --exclude='*.pptx' \
            --exclude='*.html' \
            --exclude='cursor-tasks/' \
            -e "ssh -i ~/.ssh/deploy_key -p 167 -o StrictHostKeyChecking=accept-new" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          echo "✓ Code synchronisé"

      - name: Déployer sur serveur (SSH)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 167
          # Build Docker (NO_CACHE=1 par défaut) peut dépasser le délai implicite court
          command_timeout: 45m
          # Ne pas s’appuyer sur `envs` (drone-ssh) : variables parfois absentes côté distant → `cd` silencieux + exit 1.
          # On injecte ici avec toJSON (échappement sûr des chemins / versions).
          script: |
            set -eu
            DEPLOY_PATH=${{ toJSON(secrets.DEPLOY_PATH) }}
            PKG_VER=${{ toJSON(steps.ver.outputs.pkg_ver) }}
            GIT_SHA_FULL=${{ toJSON(github.sha) }}
            # POSIX (dash sur /bin/sh) : pas de ${var:0:7} ; ssh n’exécute pas le shebang si script inline
            GIT_COMMIT_SHORT=$(printf '%.7s' "$GIT_SHA_FULL")

            echo "=========================================="
            echo "▶ Deploy s2gBot"
            echo "▶ Commit : $GIT_SHA_FULL ($GIT_COMMIT_SHORT)"
            echo "▶ Version package : $PKG_VER"
            echo "▶ Cible : $DEPLOY_PATH"
            echo "=========================================="

            if [ -z "$DEPLOY_PATH" ]; then
              echo "❌ DEPLOY_PATH vide (secret GitHub Actions manquant ?)"
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "❌ Répertoire inexistant : $DEPLOY_PATH"
              exit 1
            fi

            if ! cd "$DEPLOY_PATH"; then
              echo "❌ Impossible d’accéder au répertoire (permissions ?) : $DEPLOY_PATH"
              exit 1
            fi
            if [ ! -f .env.docker ]; then
              echo "❌ Fichier .env.docker absent (obligatoire pour docker compose / docker-prod-refresh.sh)."
              echo "   Le rsync n’envoie pas ce fichier. Sur le serveur, une fois :"
              echo "   cp $DEPLOY_PATH/docker/env.docker.example $DEPLOY_PATH/.env.docker"
              echo "   Puis éditer DB, APP_KEY, HTTP_PORT, etc., puis relancer le workflow (ou push)."
              exit 1
            fi
            chmod +x scripts/*.sh 2>/dev/null || true

            if grep -q '^APP_VERSION=' .env.docker; then
              sed -i "s|^APP_VERSION=.*|APP_VERSION=$PKG_VER|" .env.docker
            else
              printf '\nAPP_VERSION=%s\n' "$PKG_VER" >> .env.docker
            fi
            if grep -q '^GIT_COMMIT_SHORT=' .env.docker; then
              sed -i "s|^GIT_COMMIT_SHORT=.*|GIT_COMMIT_SHORT=$GIT_COMMIT_SHORT|" .env.docker
            else
              printf 'GIT_COMMIT_SHORT=%s\n' "$GIT_COMMIT_SHORT" >> .env.docker
            fi
            echo "✓ .env.docker mis à jour (APP_VERSION=$PKG_VER, GIT_COMMIT_SHORT=$GIT_COMMIT_SHORT)"

            echo "▶ Exécution docker-prod-refresh.sh"
            ./scripts/docker-prod-refresh.sh
            echo "✓ Déploiement terminé"
