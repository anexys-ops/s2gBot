# Déploiement automatique à chaque push sur la branche `main` : connexion SSH
# vers le serveur, `git fetch` + `reset --hard`, alignement APP_VERSION (.env.docker),
# puis `./scripts/docker-prod-refresh.sh`.
#
# Ne jamais commiter de PAT (`ghp_…`, `github_pat_…`) ni mot de passe : uniquement
# des secrets GitHub (chiffrement côté GitHub).
#
# Secrets (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST      — hôte SSH (ex. celui de votre infra)
#   DEPLOY_USER      — utilisateur SSH (ex. root)
#   DEPLOY_SSH_KEY   — clé privée PEM dédiée au déploiement (sans passphrase si CI)
#   DEPLOY_PATH      — racine du clone git sur le serveur (ex. /opt/s2gBot)
#
# Port SSH : 167. Pour le port 22, changer `port` ci-dessous.
#
# Sur le serveur : clone git avec accès au remote (déploy key ou HTTPS + credentials
# locaux sur la machine), `.env.docker` présent, Docker déjà opérationnel.

name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          GIT_SHA_FULL: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 167
          envs: DEPLOY_PATH,DEPLOY_BRANCH,GIT_SHA_FULL
          script_stop: true
          script: |
            set -euo pipefail
            export GIT_COMMIT_SHORT="${GIT_SHA_FULL:0:7}"
            if [ -z "${DEPLOY_PATH:-}" ] || [ -z "${DEPLOY_BRANCH:-}" ]; then
              echo "DEPLOY_PATH ou branche manquant (secrets GitHub ?)"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            if [ ! -d .git ]; then
              echo "Erreur: DEPLOY_PATH doit être un dépôt git (git init + remote + fetch une fois)."
              exit 1
            fi
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            chmod +x scripts/*.sh 2>/dev/null || true
            if [ -f react-frontend/package.json ] && [ -f .env.docker ]; then
              PKG_VER="$(grep '"version"' react-frontend/package.json | head -1 | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
              if [ -n "$PKG_VER" ]; then
                if grep -q '^APP_VERSION=' .env.docker; then
                  sed -i "s/^APP_VERSION=.*/APP_VERSION=$PKG_VER/" .env.docker
                else
                  printf '\nAPP_VERSION=%s\n' "$PKG_VER" >> .env.docker
                fi
                echo "→ APP_VERSION=$PKG_VER (.env.docker)"
              fi
            fi
            ./scripts/docker-prod-refresh.sh
