# Déploiement automatique sur ton serveur au push sur la branche principale.
#
# Configuration GitHub (Settings → Secrets and variables → Actions) :
#   DEPLOY_HOST      — hôte SSH (ex. mon-labo.fr ou 203.0.113.10)
#   DEPLOY_USER      — utilisateur SSH (ex. deploy ou www-data)
#   DEPLOY_SSH_KEY   — clé privée PEM (contenu de id_rsa / clé dédiée déploiement)
#   DEPLOY_PATH      — chemin absolu du clone git sur le serveur (ex. /var/www/s2gBot)
#
# Port SSH non standard : édite ce workflow et ajoute sous « with: » par ex. port: 2222
#
# Sur le serveur : clone du repo, fichier .env dans laravel-api/, remote git en lecture
# (clé de déploiement GitHub ou token). Puis : chmod +x scripts/deploy-server.sh
#
# Nginx conseillé : servir react-frontend/dist (ou DEPLOY_PUBLIC_HTML) et proxy /api vers PHP (Laravel).

name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_BRANCH
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${DEPLOY_PATH:-}" ] || [ -z "${DEPLOY_BRANCH:-}" ]; then
              echo "DEPLOY_PATH ou branche manquant (secrets GitHub ?)"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            chmod +x scripts/deploy-server.sh
            ./scripts/deploy-server.sh
