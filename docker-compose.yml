# Plateforme Lab BTP — 3 services Docker
#
#   web  : Nginx (SPA React) + proxy FastCGI vers l’API sur /api, /sanctum, /up
#   app  : PHP-FPM 8.4 + Laravel (API REST)
#   db   : MySQL 8 (données ; joignable depuis app sur le hostname « db »)
#
# Usage :
#   cp docker/env.docker.example .env.docker
#   # Éditer .env.docker (APP_URL, mots de passe, APP_KEY, MYSQL_PUBLISH_PORT si besoin)
#   docker compose --env-file .env.docker up -d --build
#   # Première fois : comptes démo
#   docker compose exec app php artisan db:seed --force
#
# Interface : http://localhost:${HTTP_PORT:-8080} — API : même origine, préfixes /api et /sanctum
# HTTP_PORT=80 sur le LXC si un proxy public (80/443) renvoie vers cette machine ; ne pas réutiliser le port SSH (ex. 167).
# MySQL sur l’hôte (loopback) : 127.0.0.1:${MYSQL_PUBLISH_PORT:-33060} → conteneur :3306

services:
  db:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lab_btp}
      MYSQL_USER: ${DB_USERNAME:-labbtp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-labbtp_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_change_me}
    ports:
      # Accès admin / sauvegarde depuis la machine hôte uniquement (pas d’écoute publique).
      - '127.0.0.1:${MYSQL_PUBLISH_PORT:-33060}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  app:
    build:
      context: ./laravel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lab_btp}
      DB_USERNAME: ${DB_USERNAME:-labbtp}
      DB_PASSWORD: ${DB_PASSWORD:-labbtp_secret}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:8080,127.0.0.1,127.0.0.1:8080}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      CACHE_STORE: ${CACHE_STORE:-file}
      LOG_CHANNEL: ${LOG_CHANNEL:-single}
      RUN_OPTIMIZE: ${RUN_OPTIMIZE:-1}
      RUN_SEED: ${RUN_SEED:-0}
      # Version appli exposée par /api/version. Source de vérité = .env.docker,
      # injecté par deploy.yml à chaque déploiement. Exposé explicitement ici
      # pour surpasser tout /var/www/html/.env résiduel dans l'image Docker.
      APP_VERSION: ${APP_VERSION:-}
      GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-}
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php artisan db:show --quiet > /dev/null 2>&1 || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        # Pied de page Vite (__APP_GIT_SHA__) ; sinon « dev » si absent (build sans .git).
        GIT_COMMIT_SHORT: ${GIT_COMMIT_SHORT:-}
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    depends_on:
      app:
        condition: service_healthy

volumes:
  mysql_data:
  laravel_storage:
  laravel_bootstrap_cache:
