# Exemple de vhost : SPA React + API Laravel (même origine, /api → PHP).
# Adapter les chemins (REMOTE_PATH), socket php-fpm et certificats TLS.
#
# ln -s ... /etc/nginx/sites-enabled/s2g.apps-dev.fr
# nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name s2g.apps-dev.fr;

    root /var/www/s2gBot/laravel-api/public;
    index index.html index.php;

    # ssl_certificate /etc/letsencrypt/live/s2g.apps-dev.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/s2g.apps-dev.fr/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api {
        try_files $uri /index.php?$is_args$args;
    }

    location /sanctum {
        try_files $uri /index.php?$is_args$args;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 80;
    server_name s2g.apps-dev.fr;
    return 301 https://$host$request_uri;
}
