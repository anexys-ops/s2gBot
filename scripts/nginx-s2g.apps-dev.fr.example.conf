# Exemple de vhost : SPA React + API Laravel (même origine).
# Si HTTPS « reste en chargement » alors que le port 80 répond : voir ssl_stapling ci-dessous.
#
# Déploiement automatique (recommandé) :
#   bash scripts/server-ensure-nginx-debian.sh /var/www/s2gBot s2g.apps-dev.fr
#
# Manuel :
#   ln -s … /etc/nginx/sites-enabled/s2g.apps-dev.fr
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name s2g.apps-dev.fr;

    root /var/www/s2gBot/laravel-api/public;
    index index.html index.php;

    ssl_certificate     /etc/letsencrypt/live/s2g.apps-dev.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s2g.apps-dev.fr/privkey.pem;

    # IMPORTANT : sur certains hébergeurs / DNS, OCSP stapling peut bloquer
    # toute réponse HTTP après le handshake TLS (page blanche, curl sans en-têtes).
    ssl_stapling off;
    ssl_stapling_verify off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /_nginx_ok {
        default_type text/plain;
        return 200 "nginx-ok\n";
    }

    location /api {
        try_files $uri /index.php?$is_args$args;
    }

    location /sanctum {
        try_files $uri /index.php?$is_args$args;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name s2g.apps-dev.fr;
    return 301 https://$host$request_uri;
}
